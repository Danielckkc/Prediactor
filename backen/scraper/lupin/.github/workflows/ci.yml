name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      live-platform-smoke:
        description: Run live platform package smoke checks
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test
      - run: npm run check:platform-packages
      - if: ${{ github.event_name == 'workflow_dispatch' && inputs.live-platform-smoke }}
        run: npm run check:platform-packages:smoke
      - run: node bin/lupin.js --version
      - run: node bin/lupin.js --help
